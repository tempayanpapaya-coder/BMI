<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle 3x3 - Leaderboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Segoe UI', Arial, sans-serif; 
}

body {
    background: #090d16; 
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #f8fafc;
    position: relative;
    overflow-x: hidden;
    padding: 20px;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover; 
    background-position: center; 
    background-repeat: no-repeat;
    opacity: 0.45; 
    z-index: -1;
}

.container { 
    text-align: center; 
    width: 100%; 
    max-width: 400px; 
    margin-bottom: 20px;
}

h1 { 
    margin-bottom: 15px; 
    color: #4ade80; 
    font-weight: 800;
    letter-spacing: 0.5px;
}

.info { 
    margin-bottom: 20px; 
    font-size: 16px; 
    font-weight: bold;
    color: #94a3b8;
    background: #1e293b;
    padding: 8px 16px;
    border-radius: 30px;
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.05);
}

#moves, #lives {
    color: #4ade80;
}

button {
    padding: 14px 20px; 
    border: none; 
    border-radius: 14px; 
    cursor: pointer;
    background: linear-gradient(135deg, #22c55e, #15803d);
    color: white; 
    font-weight: bold; 
    margin-bottom: 20px; 
    width: 100%;
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); 
    transition: transform 0.2s;
    -webkit-tap-highlight-color: transparent;
}

button:active { 
    transform: scale(0.98); 
}

/* KUNCI PERBAIKAN UKURAN KOTAK */
:root {
    --tile-size: min(26vw, 100px); /* Disesuaikan sedikit agar pas di layar HP kecil */
    --gap-size: 10px;
    --padding-size: 16px;
}

.puzzle {
    position: relative;
    /* Lebar & Tinggi dikunci total berdasarkan kalkulasi ubin + gap + padding */
    width: calc((var(--tile-size) * 3) + (var(--gap-size) * 2) + (var(--padding-size) * 2));
    height: calc((var(--tile-size) * 3) + (var(--gap-size) * 2) + (var(--padding-size) * 2));
    padding: var(--padding-size); 
    border-radius: 24px;
    background: #111827; 
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    margin: 0 auto;
    box-sizing: border-box;
}

.tile {
    position: absolute; 
    width: var(--tile-size);
    height: var(--tile-size);
    background: linear-gradient(145deg, #3b82f6, #1d4ed8);
    border-radius: 16px; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    font-size: clamp(22px, 7vw, 32px); 
    font-weight: 800; 
    color: white; 
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    transition: transform 0.15s ease-out; /* Dipercepat sedikit agar lebih responsif */
    will-change: transform;
    -webkit-tap-highlight-color: transparent;
}

.tile::before {
    content: ''; 
    position: absolute; 
    top: 4px; left: 6px; right: 6px; height: 30%; 
    border-radius: 10px;
    background: linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0)); 
    pointer-events: none;
}

.tile:active { 
    transform: scale(0.95); 
}

.failed { 
    animation: shakeFail 0.4s ease-in-out; 
}
@keyframes shakeFail { 
    0%, 100+ { transform: translateX(0); } 
    25% { transform: translateX(-6px); } 
    75% { transform: translateX(6px); } 
}

.won { 
    border: 2px solid #22c55e; 
}
.won .tile { 
    background: linear-gradient(145deg, #22c55e, #15803d); 
}

#message { 
    margin-top: 18px; 
    font-weight: 600; 
    min-height: 24px; 
    color: #f59e0b;
    font-size: 14px;
    padding: 0 10px;
    line-height: 1.4;
}

.leaderboard-box {
    width: 100%; 
    max-width: 400px; 
    margin-top: 25px;
    background: #111827; 
    border: 1px solid rgba(255, 215, 120, 0.15);
    border-radius: 20px; 
    padding: 18px; 
    box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}

.leaderboard-title {
    text-align: center; 
    color: #fbbf24; 
    font-size: 15px; 
    font-weight: 800; 
    margin-bottom: 15px; 
    letter-spacing: 1px;
}

.rank-item {
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    padding: 10px 14px; 
    margin-bottom: 8px; 
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.03); 
    border: 1px solid rgba(255, 255, 255, 0.03);
}

.rank-1 { background: linear-gradient(90deg, rgba(245, 158, 11, 0.15), transparent); border-color: rgba(245, 158, 11, 0.25); }
.rank-2 { background: linear-gradient(90deg, rgba(148, 163, 184, 0.1), transparent); border-color: rgba(148, 163, 184, 0.2); }
.rank-3 { background: linear-gradient(90deg, rgba(180, 83, 9, 0.15), transparent); border-color: rgba(180, 83, 9, 0.2); }

.rank-player { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    font-weight: 600; 
}
.rank-num { 
    font-size: 14px; 
    color: #64748b; 
    width: 20px; 
}
.rank-1 .rank-num { 
    font-size: 16px; 
}
.rank-score { 
    font-weight: 800; 
    color: #4ade80; 
}
</style>
</head>

<body>

<div class="container">
    <div class="info">Langkah: <span id="moves">0</span> &nbsp;|&nbsp; Kesempatan: <span id="lives">3</span>/3</div>

    <button onclick="startGame()">Acak & Mulai Permainan</button>

    <div class="puzzle" id="puzzle"></div>
    <div id="message">👇 Klik 'Acak & Mulai Permainan'</div>
</div>

<div class="leaderboard-box">
    <div class="leaderboard-title">🏆 KLASEMEN GLOBAL (TOP 3)</div>
    <div id="leaderboardList">
        <div style="text-align:center; color:#888; font-size:14px;">Memuat data klasemen...</div>
    </div>
</div>

<script>
// --- 1. KONFIGURASI FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyATIQKEoacfqd_P5mBn915gzwbsLQE-va8",
    authDomain: "spp-unisri-taekwondo.firebaseapp.com",
    projectId: "spp-unisri-taekwondo",
    storageBucket: "spp-unisri-taekwondo.firebasestorage.app",
    messagingSenderId: "888126318699",
    appId: "1:888126318699:web:6e1ef3d5a49908c2b5692e"
};
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.firestore();

// --- 2. IDENTIFIKASI PEMAIN DARI LOCALSTORAGE ---
let currentUser = null;
const savedLogin = localStorage.getItem("bmi_member_login");
if(savedLogin) {
    currentUser = JSON.parse(savedLogin).username;
} else {
    alert("Perhatian: Anda belum login di Member Area. Skor Anda tidak akan tersimpan di klasemen.");
}

// --- 3. LOGIKA GAME ---
let gameOver = true;
const MAX_LIVES = 3;
let lives = MAX_LIVES;
const puzzle = document.getElementById("puzzle");
const movesText = document.getElementById("moves");
const message = document.getElementById("message");

let moves = 0;
let tiles = [1,2,3, 4,5,6, 7,8,0];
let tileElements = {}; 

function susunDOMAwal() {
    puzzle.innerHTML = "";
    // Hanya membuat ubin 1 sampai 8, ubin 0 (kosong) dihilangkan total dari DOM
    for (let i = 1; i <= 8; i++) {
        const tileDiv = document.createElement("div");
        tileDiv.classList.add("tile");
        tileDiv.textContent = i;
        tileDiv.addEventListener("click", () => tanganiKlikUbin(i));
        puzzle.appendChild(tileDiv);
        tileElements[i] = tileDiv;
    }
}

// KUNCI UTAMA: Penyesuaian kalkulasi posisi agar masuk presisi di dalam frame .puzzle
function updatePosisiVisual() {
    const size = "var(--tile-size)";
    const gap = "var(--gap-size)";
    const padding = "var(--padding-size)";

    tiles.forEach((tile, index) => {
        if (tile !== 0) {
            const row = Math.floor(index / 3);
            const col = index % 3;
            
            // Menggunakan titik 0,0 kontainer induk yang sudah terpotong padding dengan benar
            const x = `calc(${padding} + (${col} * (${size} + ${gap})))`;
            const y = `calc(${padding} + (${row} * (${size} + ${gap})))`;
            
            tileElements[tile].style.left = "0px";
            tileElements[tile].style.top = "0px";
            tileElements[tile].style.transform = `translate(${x}, ${y})`;
        }
    });
}

function tanganiKlikUbin(nomorUbin) {
    if(gameOver) return;
    const index = tiles.indexOf(nomorUbin);
    const empty = tiles.indexOf(0);
    
    const rowTile = Math.floor(index/3); const colTile = index%3;
    const rowEmpty = Math.floor(empty/3); const colEmpty = empty%3;
    
    if(Math.abs(rowTile-rowEmpty) + Math.abs(colTile-colEmpty) === 1){
        [tiles[index],tiles[empty]] = [tiles[empty],tiles[index]];
        moves++;
        movesText.textContent = moves;
        if(moves >= 51){ loseGame(); return; }
        updatePosisiVisual();
        checkWin();
    }
}

function checkWin(){
    const win = [1,2,3,4,5,6,7,8,0];
    if(JSON.stringify(tiles) === JSON.stringify(win)){
        gameOver = true;
        puzzle.classList.add("won");

        if(moves >= 51){
            kurangiNyawa();
            if(lives <= 0) {
                tampilkanPesanHabis();
                setTimeout(() => alert(ambilFormatPesanHabis()), 300);
            } else {
                message.innerHTML = "Selesai, tapi terlalu banyak langkah!";
                setTimeout(() => alert('Anda menang, tapi menggunakan ' + moves + ' langkah (Maks 50). Kesempatan harian Anda berkurang 1.'), 300);
            }
        } else {
            message.innerHTML = "🏆 LUAR BIASA! Selesai dalam " + moves + " langkah!";
            simpanSkorKeDatabase(moves); 
            setTimeout(() => alert('🎉 SELAMAT! Anda memecahkan puzzle dengan ' + moves + ' langkah! Cek klasemen di bawah! 🏆'), 300);
        }
    }
}

function kurangiNyawa(){
    lives--;
    localStorage.setItem('lives', lives);
    document.getElementById('lives').textContent = lives;
    
    if(lives <= 0 && !localStorage.getItem('lockoutTime')) {
        const sekarang = new Date();
        const jam = String(sekarang.getHours()).padStart(2, '0');
        const menit = String(sekarang.getMinutes()).padStart(2, '0');
        localStorage.setItem('lockoutTime', `${jam}:${menit}`);
    }
}

function ambilFormatPesanHabis() {
    let waktuBermain = localStorage.getItem('lockoutTime');
    if(!waktuBermain) {
        const sekarang = new Date();
        const jam = String(sekarang.getHours()).padStart(2, '0');
        const menit = String(sekarang.getMinutes()).padStart(2, '0');
        waktuBermain = `${jam}:${menit}`;
    }
    return `🚫 Kesempatan anda telah habis hari ini, silahkan kembali besuk pukul ${waktuBermain} WIB.`;
}

function tampilkanPesanHabis() {
    message.innerHTML = ambilFormatPesanHabis();
}

function loseGame(){
    puzzle.classList.add("failed");
    gameOver = true;
    kurangiNyawa();
    
    if(lives <= 0) {
        tampilkanPesanHabis();
    } else {
        message.innerHTML = "💀 Kesempatan gagal! Maksimal 50 langkah.";
    }
}

function shufflePuzzle(){
    moves = 0; movesText.textContent = 0;
    for(let i=0; i<200; i++){
        const empty = tiles.indexOf(0);
        const row = Math.floor(empty/3); const col = empty%3;
        let p = [];
        if(row>0) p.push(empty-3); if(row<2) p.push(empty+3);
        if(col>0) p.push(empty-1); if(col<2) p.push(empty+1);
        const rand = p[Math.floor(Math.random()*p.length)];
        [tiles[rand],tiles[empty]] = [tiles[empty],tiles[rand]];
    }
    updatePosisiVisual();
}

function startGame(){
    puzzle.classList.remove("failed", "won"); 
    if(lives <= 0){ 
        alert(ambilFormatPesanHabis()); 
        tampilkanPesanHabis();
        return; 
    }
    gameOver = false;
    message.innerHTML = "🔥 Ayo pecahkan rekor!";
    shufflePuzzle();
}

function checkDailyReset(){
    const today = new Date().toISOString().split('T')[0];
    if(localStorage.getItem('lastDate') !== today){
        localStorage.setItem('lastDate', today);
        localStorage.setItem('lives', MAX_LIVES);
        localStorage.removeItem('lockoutTime');
    }
    lives = parseInt(localStorage.getItem('lives')) || MAX_LIVES;
    document.getElementById('lives').textContent = lives;
    
    if (lives <= 0) {
        tampilkanPesanHabis();
    }
}

// Inisialisasi awal permainan
susunDOMAwal();
updatePosisiVisual();
checkDailyReset();

// =====================================================
// LEADERBOARD GLOBAL TOP 3
// =====================================================
async function simpanSkorKeDatabase(langkah){
    if(!currentUser) return;
    try{
        let namaPemain = currentUser;
        const siswaSnapshot = await db.collection("siswa").where("username","==",currentUser).get();
        if(!siswaSnapshot.empty){
            namaPemain = siswaSnapshot.docs[0].data().nama || currentUser;
        }

        const docRef = db.collection("puzzle_leaderboard").doc(currentUser);
        const doc = await docRef.get();

        if(!doc.exists){
            await docRef.set({
                username: currentUser,
                nama: namaPemain,
                best_score: langkah,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            return;
        }

        const oldScore = doc.data().best_score;
        if(langkah < oldScore){
            await docRef.update({
                best_score: langkah,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    }catch(error){
        console.error("Gagal menyimpan skor:", error);
    }
}

db.collection("puzzle_leaderboard")
.orderBy("best_score","asc")
.limit(3)
.onSnapshot((querySnapshot)=>{
    const listContainer = document.getElementById("leaderboardList");
    if(querySnapshot.empty){
        listContainer.innerHTML = `<div style="text-align:center; color:#888; font-size:14px;">Belum ada juara.</div>`;
        return;
    }

    let html = "";
    let rank = 1;

    querySnapshot.forEach((doc)=>{
        const data = doc.data();
        const trophy = rank === 1 ? "🥇" : rank === 2 ? "🥈" : "🥉";
        const isMe = data.username === currentUser ? " (Anda)" : "";

        html += `
            <div class="rank-item rank-${rank}">
                <div class="rank-player">
                    <span class="rank-num">${trophy}</span>
                    <span style="color:${isMe ? '#ffd36b' : '#ffffff'};">${data.nama}${isMe}</span>
                </div>
                <div class="rank-score">
                    ${data.best_score} <span style="font-size:11px; color:#888;">Langkah</span>
                </div>
            </div>
        `;
        rank++;
    });
    listContainer.innerHTML = html;
}, (error)=>{
    console.error("Error leaderboard:", error);
});

const style = document.createElement('style');
style.innerHTML = `body::before { background-image: url('https://raw.githubusercontent.com/tempayanpapaya-coder/Komponen/refs/heads/main/Footer.png'); }`;
document.head.appendChild(style);
</script>

</body>
</html>
